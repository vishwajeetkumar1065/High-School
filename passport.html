<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Passport Photo Maker</title>
    
    <script async src="https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.5.5/opencv.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Version update kiya hai taaki cache clear ho jaye -->
    <script src="config.js?v=auto_studio_v2"></script>
    
    <style>
        * { touch-action: manipulation; box-sizing: border-box; font-family: sans-serif; }
        body { background: #eef2f3; padding: 10px; text-align: center; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #1976d2; margin-top: 0; }
        
        .info-banner { font-size: 14px; font-weight: bold; margin-bottom: 15px; padding: 10px; border-radius: 4px; background: #e8f5e9; color: #2e7d32; border: 1px solid #4caf50; }
        .offline-banner { font-size: 13px; font-weight: bold; color: #1565c0; background: #e3f2fd; padding: 5px; border-radius: 4px; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { font-size: 14px; color: #555; display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="tel"], input[type="number"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        .upload-btn { background: #ff9800; color: white; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; display: inline-block; width: 100%; margin-bottom: 15px; border: 2px solid #e65100; transition: opacity 0.3s; }
        input[type="file"] { display: none; }
        
        .status-box { background: #fff3e0; color: #e65100; padding: 10px; border-radius: 6px; font-weight: bold; display: none; margin-bottom: 15px; border: 1px dashed #ffb74d; }
        
        .controls { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .controls select { flex: 1; min-width: 45%; padding: 8px; border: 2px solid #ccc; border-radius: 6px; font-weight: bold; font-size: 13px; }
        
        button.process-btn { background: #28a745; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        button.process-btn:disabled { background: #aaa; cursor: not-allowed; }
        
        .preview-container { margin-top: 10px; border: 2px dashed #1976d2; padding: 10px; background: #fafafa; border-radius: 8px; overflow: auto; display: flex; justify-content: center; }
        #finalCanvas { max-width: 100%; height: auto; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: none; }
        
        #submitBtn { background: #1976d2; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; display: none; transition: opacity 0.2s; }
        
        /* 🔥 Sliders Style */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #1976d2; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #bbdefb; border-radius: 3px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📸 Auto-Smart Passport Maker</h2>
    <div class="offline-banner">⚡ Powered by Python Studio Server</div>
    
    <input type="text" id="name" class="input-group" placeholder="Customer Name (Optional)">
    <input type="tel" id="mobile" class="input-group" placeholder="Mobile Number (Optional)">

    <label class="upload-btn">
        1. Select Customer Photo
        <input type="file" id="uploadImage" accept="image/*" onchange="window.loadImage(event)">
    </label>

    <div class="controls">
        <select id="bgColor" onchange="if(window.noBgImg) window.redrawCanvas()">
            <option value="#FFFFFF">BG: White</option>
            <option value="#3b82f6">BG: Blue</option>
            <option value="#ef4444">BG: Red</option>
        </select>
        <select id="faceClean" onchange="if(window.noBgImg) window.redrawCanvas()">
            <option value="yes">Face Clean: Soft ✨</option>
            <option value="no">Face Clean: OFF</option>
        </select>
    </div>

    <div id="statusBox" class="status-box">Processing...</div>

    <button id="processBtn" class="process-btn" onclick="window.generatePassportPhotos()" disabled>2. Magic Process & Generate</button>

    <div id="liveAdjustControls" style="display: none; background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #1976d2; text-align: left;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <label style="font-size: 14px; font-weight: bold; color: #1565c0; margin: 0;">🎛️ Manual Override</label>
            <span style="background: #4caf50; color: white; padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: bold;">✨ Auto-Aligned</span>
        </div>
        
        <div style="margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px;">
                <span>Zoom In/Out 🔍</span>
                <span id="zoomValTxt">1.2x</span>
            </div>
            <input type="range" id="zoomSlider" min="1" max="8" step="0.1" value="1.2" oninput="window.updateSliders()">
        </div>
        
        <div style="margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px;">
                <span>Move Up/Down ↕️</span>
            </div>
            <input type="range" id="ySlider" min="-1500" max="1500" step="10" value="0" oninput="window.updateSliders()">
        </div>

        <div>
            <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px;">
                <span>Move Left/Right ↔️</span>
            </div>
            <input type="range" id="xSlider" min="-1000" max="1000" step="10" value="0" oninput="window.updateSliders()">
        </div>
    </div>

    <div class="preview-container">
        <p id="previewText" style="color: #999; margin: 20px 0;">Preview will appear here</p>
        <canvas id="finalCanvas" width="1800" height="1200"></canvas>
    </div>

    <div id="orderSection" style="display: none; margin-top: 15px;">
        <div class="input-group">
            <label>Number of Copies (Sheets):</label>
            <input type="number" id="copies" value="1" min="1" oninput="window.calculate()">
        </div>
        <h3 id="total" style="text-align:center; color: #d32f2f;">Total: ₹30</h3>
        <button id="submitBtn" onclick="window.submitOrder()">3. Submit Order to Print</button>
    </div>
</div>

<script>
    let rawBlob = null;
    let imgLoaded = false;
    const perSheetRate = 30; 
    const PYTHON_SERVER_URL = "http://localhost:5000/api/remove-bg";
    window.noBgImg = null; 

    window.calculate = function() {
        let copies = parseInt(document.getElementById("copies").value) || 1;
        document.getElementById("total").innerHTML = "Total: ₹" + (copies * perSheetRate);
    };

    window.loadImage = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        rawBlob = file; 
        imgLoaded = true;
        document.getElementById('processBtn').disabled = false;
        document.getElementById('processBtn').innerText = "2. Magic Process & Generate";
        
        window.noBgImg = null;
        document.getElementById('liveAdjustControls').style.display = "none";
        document.getElementById('finalCanvas').style.display = "none";
        document.getElementById('orderSection').style.display = "none";
        document.getElementById('submitBtn').style.display = "none";
        document.getElementById('previewText').style.display = "block";
    };

    window.generatePassportPhotos = async function() {
        if (!imgLoaded) return alert("Please upload an image first.");

        const btn = document.getElementById('processBtn');
        const status = document.getElementById('statusBox');
        
        btn.disabled = true;
        status.style.display = "block";
        document.getElementById('previewText').style.display = "none";

        try {
            status.innerText = "🤖 Removing Background & Scanning Body... Please wait";
            
            const formData = new FormData();
            formData.append("image", rawBlob);

            const response = await fetch(PYTHON_SERVER_URL, {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("Server Error! Kya aapka Python server chalu hai?");

            const transparentBlob = await response.blob();
            const transparentUrl = URL.createObjectURL(transparentBlob);
            
            window.noBgImg = new Image();
            window.noBgImg.src = transparentUrl;
            await new Promise((resolve, reject) => { 
                window.noBgImg.onload = resolve; 
                window.noBgImg.onerror = () => reject("Image load fail.");
            });
            
            status.style.display = "none";
            btn.innerText = "✓ Generated Automatically!";
            btn.style.background = "#6c757d"; 
            
            document.getElementById('liveAdjustControls').style.display = "block";
            window.autoAdjustFrame();

        } catch (error) {
            alert(error.message);
            btn.disabled = false;
            btn.innerText = "Try Again";
            status.style.display = "none";
        }
    };

    window.autoAdjustFrame = function() {
        if(!window.noBgImg) return;

        let cvs = document.createElement('canvas');
        cvs.width = window.noBgImg.width;
        cvs.height = window.noBgImg.height;
        let ctx = cvs.getContext('2d');
        ctx.drawImage(window.noBgImg, 0, 0);
        let data = ctx.getImageData(0, 0, cvs.width, cvs.height).data;

        let topY = -1, bottomY = -1, leftX = cvs.width, rightX = -1;

        for (let y = 0; y < cvs.height; y += 4) { 
            for (let x = 0; x < cvs.width; x += 4) {
                let alpha = data[(y * cvs.width + x) * 4 + 3];
                if (alpha > 20) {
                    if (topY === -1) topY = y;
                    bottomY = y;
                    if (x < leftX) leftX = x;
                    if (x > rightX) rightX = x;
                }
            }
        }

        if(topY === -1) { window.redrawCanvas(); return; } 

        let subjHeight = bottomY - topY;
        
        let testY = topY + Math.floor(subjHeight * 0.08); 
        let headL = cvs.width, headR = 0;
        
        for (let x = 0; x < cvs.width; x++) {
            if (data[(testY * cvs.width + x) * 4 + 3] > 20) {
                if (x < headL) headL = x;
                if (x > headR) headR = x;
            }
        }
        
        let headWidth = headR - headL;
        if(headWidth <= 0) headWidth = (rightX - leftX) * 0.4; 
        
        let headCenterX = (headL + headR) / 2;

        const pWidth = 413;
        const pHeight = 531;

        let targetDrawHeadWidth = pWidth * 0.55;
        let requiredScale = targetDrawHeadWidth / headWidth;
        let defaultScale = Math.max(pWidth / window.noBgImg.width, pHeight / window.noBgImg.height);
        
        let finalZoom = requiredScale / defaultScale;
        if(finalZoom < 1) finalZoom = 1;
        if(finalZoom > 8) finalZoom = 8;
        let appliedScale = defaultScale * finalZoom;

        let drawW = window.noBgImg.width * appliedScale;
        let defaultDrawX = (pWidth - drawW) / 2;
        let currentHeadXOnCanvas = defaultDrawX + (headCenterX * appliedScale);
        let targetXOffset = (pWidth / 2) - currentHeadXOnCanvas;

        let drawH = window.noBgImg.height * appliedScale;
        let defaultDrawY = (pHeight - drawH) * 0.10;
        let currentHeadTopOnCanvas = defaultDrawY + (topY * appliedScale);
        
        let targetTopGap = pHeight * 0.08;
        let targetYOffset = targetTopGap - currentHeadTopOnCanvas;

        document.getElementById('zoomSlider').value = finalZoom.toFixed(2);
        document.getElementById('xSlider').value = targetXOffset.toFixed(0);
        document.getElementById('ySlider').value = targetYOffset.toFixed(0);
        document.getElementById('zoomValTxt').innerText = finalZoom.toFixed(2) + "x";
        
        window.redrawCanvas();
    };

    window.updateSliders = function() {
        document.getElementById('zoomValTxt').innerText = document.getElementById('zoomSlider').value + "x";
        window.redrawCanvas();
    };

    let redrawTimeout = null;
    window.redrawCanvas = function() {
        if (!window.noBgImg) return;
        
        if(redrawTimeout) cancelAnimationFrame(redrawTimeout);
        redrawTimeout = requestAnimationFrame(() => {
            
            const pWidth = 413;
            const pHeight = 531;
            
            let singleCvs = document.createElement('canvas');
            singleCvs.width = pWidth;
            singleCvs.height = pHeight;
            let sCtx = singleCvs.getContext('2d');

            sCtx.imageSmoothingEnabled = true;
            sCtx.imageSmoothingQuality = 'high';

            sCtx.fillStyle = document.getElementById('bgColor').value;
            sCtx.fillRect(0, 0, pWidth, pHeight);

            const zoomValue = parseFloat(document.getElementById('zoomSlider').value);
            const yOffset = parseFloat(document.getElementById('ySlider').value);
            const xOffset = parseFloat(document.getElementById('xSlider').value);

            const scale = Math.max(pWidth / window.noBgImg.width, pHeight / window.noBgImg.height) * zoomValue;
            const drawW = window.noBgImg.width * scale;
            const drawH = window.noBgImg.height * scale;
            
            const dx = (pWidth - drawW) / 2 + xOffset;
            const dy = (pHeight - drawH) * 0.10 + yOffset; 

            sCtx.drawImage(window.noBgImg, dx, dy, drawW, drawH);

            if (document.getElementById('faceClean').value === 'yes') {
                try {
                    if (typeof cv !== 'undefined' && cv.Mat) {
                        let src = cv.imread(singleCvs);
                        let dst = new cv.Mat();
                        cv.cvtColor(src, src, cv.COLOR_RGBA2RGB, 0);
                        cv.bilateralFilter(src, dst, 5, 40, 40, cv.BORDER_DEFAULT);
                        cv.imshow(singleCvs, dst);
                        src.delete(); dst.delete();
                    }
                } catch (cvError) {
                    console.warn("OpenCV error");
                }
            }

            sCtx.lineWidth = 6; 
            sCtx.strokeStyle = "black";
            sCtx.strokeRect(0, 0, pWidth, pHeight);

            const finalCvs = document.getElementById('finalCanvas');
            const fCtx = finalCvs.getContext('2d');
            
            fCtx.imageSmoothingEnabled = true;
            fCtx.imageSmoothingQuality = 'high';
            fCtx.fillStyle = "#FFFFFF";
            fCtx.fillRect(0, 0, finalCvs.width, finalCvs.height);

            const cols = 4;
            const rows = 2;
            const gapX = (finalCvs.width - (cols * pWidth)) / (cols + 1);
            const gapY = (finalCvs.height - (rows * pHeight)) / (rows + 1);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let posX = gapX + c * (pWidth + gapX);
                    let posY = gapY + r * (pHeight + gapY);
                    fCtx.drawImage(singleCvs, posX, posY, pWidth, pHeight);
                }
            }

            finalCvs.style.display = "block";
            document.getElementById('orderSection').style.display = "block";
            document.getElementById('submitBtn').style.display = "block";
            window.calculate();
        });
    };

    window.submitOrder = async function() {
        const client = window.supabase.createClient(window.SITE_CONFIG.SUPABASE_URL, window.SITE_CONFIG.SUPABASE_KEY);
        const isAdmin = localStorage.getItem('adminMode') === 'true';

        const lastOrderTime = localStorage.getItem("last_order_time");
        if (!isAdmin && lastOrderTime && (Date.now() - parseInt(lastOrderTime)) < 60000) { 
            alert("⏳ Please wait 1 minute before placing another order.");
            return;
        }

        const rawName = document.getElementById("name").value.trim();
        const rawMobile = document.getElementById("mobile").value.trim();
        const name = rawName.replace(/<[^>]*>?/gm, ''); 
        const mobile = rawMobile.replace(/[^0-9+]/g, ''); 

        const submitBtn = document.getElementById("submitBtn");
        submitBtn.innerText = "Uploading to Printer... Please wait";
        submitBtn.disabled = true;

        try {
            const finalCvs = document.getElementById('finalCanvas');
            const processedBlob = await new Promise(resolve => {
                finalCvs.toBlob(resolve, 'image/jpeg', 1.0); 
            });

            const fileName = `${Date.now()}_passport_4x6.jpg`;

            const { error: uploadError } = await client.storage.from("documents").upload(fileName, processedBlob, { contentType: "image/jpeg", upsert: true });
            if (uploadError) throw uploadError;

            const copies = document.getElementById("copies").value;
            const amount = parseInt(document.getElementById("total").innerHTML.replace("Total: ₹", ""));

            const finalPaymentStatus = isAdmin ? "Paid (Admin)" : "Pending";
            const finalPaymentId = isAdmin ? "Direct-Shop-Print" : "";

            const { data: order, error } = await client.from("orders").insert([{
                customer_name: name || (isAdmin ? "Shop Admin" : "Guest"),
                mobile: mobile || "N/A", 
                pages: copies, 
                print_type: "Passport (8 Photos)", 
                amount: amount,
                file_url: client.storage.from("documents").getPublicUrl(fileName).data.publicUrl, 
                payment_status: finalPaymentStatus, 
                payment_id: finalPaymentId,
                layout_mode: 1 
            }]).select();

            if (error) throw error;
            
            localStorage.setItem("last_order_time", Date.now());
            localStorage.setItem("amount", amount); 
            localStorage.setItem("mobile", mobile); 
            localStorage.setItem("current_order_id", order[0].id);
            
            if (isAdmin) {
                alert("👑 Owner Mode: Passport photo sent directly to printer!");
                window.location.reload(); 
            } else {
                window.location.href = "payment.html"; 
            }

        } catch (err) {
            alert(err.message);
            submitBtn.innerText = "3. Submit Order to Print";
            submitBtn.disabled = false;
        }
    };
</script>

</body>
</html>
